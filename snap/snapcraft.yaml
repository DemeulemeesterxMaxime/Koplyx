name: koplyx
title: Koplyx
base: core24
version: "0.2.4"
summary: Local encrypted clipboard history
description: |
  Koplyx is a Linux clipboard history app for text, images, and copied files.
  It stores clipboard entries locally with encryption, supports decrypted
  in-app previews, pinned text, search, quick restore, optional auto-paste on
  X11, and a system tray indicator.
license: MIT
contact: https://github.com/DemeulemeesterxMaxime/Koplyx/issues
issues: https://github.com/DemeulemeesterxMaxime/Koplyx/issues
source-code: https://github.com/DemeulemeesterxMaxime/Koplyx
website: https://github.com/DemeulemeesterxMaxime/Koplyx
donation: https://github.com/DemeulemeesterxMaxime/Koplyx
icon: assets/icons/dev.limax.koplyx.svg

grade: stable
confinement: strict

platforms:
  amd64:
  arm64:

apps:
  koplyx:
    command: bin/koplyx-snap-launcher
    desktop: usr/share/applications/dev.limax.koplyx.desktop
    extensions: [gnome]
    plugs:
      - desktop
      - desktop-legacy
      - gsettings
      - home
      - password-manager-service
      - unity7
      - wayland
      - x11

parts:
  koplyx:
    plugin: nil
    source: .
    source-type: local
    stage:
      - opt/koplyx
      - bin/koplyx-snap-launcher
      - usr/share/applications/dev.limax.koplyx.desktop
      - usr/share/icons/hicolor/scalable/apps/dev.limax.koplyx.svg
    override-build: |
      mkdir -p "$CRAFT_PART_INSTALL/opt/koplyx"
      cp -a \
        "$CRAFT_PART_SRC/assets" \
        "$CRAFT_PART_SRC/docs" \
        "$CRAFT_PART_SRC/koplyx" \
        "$CRAFT_PART_SRC/packaging" \
        "$CRAFT_PART_SRC/README.md" \
        "$CRAFT_PART_SRC/VERSION" \
        "$CRAFT_PART_INSTALL/opt/koplyx/"

      mkdir -p "$CRAFT_PART_INSTALL/bin"
      cat > "$CRAFT_PART_INSTALL/bin/koplyx-snap-launcher" <<'EOF'
      #!/usr/bin/env sh
      set -eu

      export PYTHONPATH="${SNAP}/opt/koplyx:${PYTHONPATH:-}"
      export XDG_DATA_DIRS="${SNAP}/usr/share:${SNAP}/share:${XDG_DATA_DIRS:-/usr/local/share:/usr/share}"
      export GDK_PIXBUF_MODULE_FILE="${SNAP}/usr/lib/${SNAPCRAFT_ARCH_TRIPLET}/gdk-pixbuf-2.0/2.10.0/loaders.cache"

      exec "${SNAP}/usr/bin/python3" "${SNAP}/opt/koplyx/koplyx/main.py" "$@"
      EOF
      install -Dm644 "$CRAFT_PART_INSTALL/opt/koplyx/packaging/dev.limax.koplyx.desktop" "$CRAFT_PART_INSTALL/usr/share/applications/dev.limax.koplyx.desktop"
      install -Dm644 "$CRAFT_PART_INSTALL/opt/koplyx/assets/icons/dev.limax.koplyx.svg" "$CRAFT_PART_INSTALL/usr/share/icons/hicolor/scalable/apps/dev.limax.koplyx.svg"
      chmod 0755 "$CRAFT_PART_INSTALL/bin/koplyx-snap-launcher"
      sed -i 's|^Exec=.*|Exec=koplyx|g' "$CRAFT_PART_INSTALL/usr/share/applications/dev.limax.koplyx.desktop"
      sed -i 's|^Icon=.*|Icon=${SNAP}/usr/share/icons/hicolor/scalable/apps/dev.limax.koplyx.svg|g' "$CRAFT_PART_INSTALL/usr/share/applications/dev.limax.koplyx.desktop"
    stage-packages:
      - dbus-user-session
      - gir1.2-gdkpixbuf-2.0
      - gir1.2-gtk-4.0
      - python3
      - python3-cryptography
      - python3-dbus
      - python3-gi
      - python3-pil
      - python3-secretstorage
      - xdotool
