name: Build release artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check forbidden tracked files
        run: |
          forbidden="$(git ls-files | grep -E '(^|/)(\.env|key\.bin|history\.db|config\.json|snapcraft-login)$|(\.snap|\.deb|\.tar\.gz)$' || true)"
          if [ -n "$forbidden" ]; then
            printf '%s\n' "$forbidden"
            exit 1
          fi

      - name: Check obvious secrets
        run: |
          if git grep -n -i -E '(BEGIN (RSA|DSA|EC|OPENSSH|PGP) PRIVATE KEY|AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9_]{36,}|github_pat_|xox[baprs]-|snapcraft-login|api[_-]?key[=:][^[:space:]]+|password[=:][^[:space:]]+)' -- . ':!.github/workflows/release.yml'; then
            exit 1
          fi

  build:
    needs: security-scan
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dbus-user-session \
            dpkg-dev \
            fakeroot \
            gir1.2-gdkpixbuf-2.0 \
            gir1.2-gtk-4.0 \
            python3-cryptography \
            python3-dbus \
            python3-gi \
            python3-pil \
            xdotool \
            xvfb

      - name: Smoke test
        run: xvfb-run -a ./scripts/smoke-test.sh

      - name: Build artifacts
        run: ./scripts/build-dist.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: koplyx-linux
          path: |
            dist/*.tar.gz
            dist/*.deb
            dist/SHA256SUMS

  build-snap:
    needs: security-scan
    runs-on: ubuntu-24.04
    env:
      SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build snap
        id: snapcraft
        uses: canonical/action-build@v1

      - name: Upload snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: koplyx-snap
          path: ${{ steps.snapcraft.outputs.snap }}

      - name: Publish snap to edge
        if: startsWith(github.ref, 'refs/tags/') && env.SNAPCRAFT_STORE_CREDENTIALS != ''
        uses: canonical/action-publish@v1
        with:
          snap: ${{ steps.snapcraft.outputs.snap }}
          release: edge

  github-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: koplyx-linux
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.deb
            dist/SHA256SUMS
